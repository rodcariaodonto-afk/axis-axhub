<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="800" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">AXIS Logo Vector</title>
  <desc id="desc">Recriação vetorial da marca AXIS com fundo transparente.</desc>
  <defs>
    <style>
      .navy{fill:#0B213B;}
      .blue{fill:#0B66F6;}
    </style>
  </defs>

  <!-- Símbolo principal -->
  <g id="axis-symbol">
    <!-- Estrutura estilizada em A -->
    <path class="navy" fill-rule="evenodd" d="
      M203 417
      L263 417
      L372 249
      L433 333
      L368 417
      L425 417
      L461 373
      L493 417
      L552 417
      L397 200
      L345 200
      Z"/>

    <!-- Travessa interna inclinada -->
    <polygon class="navy" points="339,345 397,345 371,380 314,380"/>

    <!-- Acento azul superior direito -->
    <polygon class="blue" points="528,200 588,200 498,315 469,276"/>
  </g>

  <!-- Wordmark AXIS reconstruído em formas vetoriais -->
  <g id="axis-wordmark" transform="translate(238 498)">
    <!-- A -->
    <polygon class="navy" points="0,57 38,0 51,0 89,57 74,57 44.5,14 15,57"/>
    <polygon fill="transparent" points="34,37 55,37 44.5,21"/>

    <!-- X: duas lâminas escuras com interseção azul -->
    <polygon class="navy" points="111,0 128,0 181,57 162,57"/>
    <polygon class="navy" points="181,0 162,0 111,57 128,57"/>
    <polygon class="blue" points="154,20 169,0 184,0 162,27"/>
    <polygon class="blue" points="146,37 156,26 166,36 149,57 134,57"/>

    <!-- I -->
    <rect class="navy" x="194" y="0" width="12" height="57"/>

    <!-- S geométrico -->
    <path class="navy" d="
      M241 0
      L286 0
      L286 12
      L246 12
      Q239 12 239 19
      L239 22
      Q239 29 247 29
      L273 29
      Q291 29 291 46
      L291 57
      L234 57
      L234 45
      L277 45
      Q284 45 284 39
      L284 36
      Q284 30 276 30
      L250 30
      Q232 30 232 13
      L232 10
      Q232 0 241 0
      Z"/>
  </g>
</svg>
